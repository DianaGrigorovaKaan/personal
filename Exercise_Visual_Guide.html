<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exercise Guide - Strong By Summer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --card: #ffffff;
    --text: #1a1a2e;
    --muted: #6b7280;
    --accent: #e94560;
    --blue: #0f3460;
    --green: #2e7d32;
    --warm: #ff6f00;
    --border: #e5e7eb;
    --shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    padding: 24px 16px 80px;
  }

  .header {
    text-align: center;
    padding: 32px 0 24px;
  }
  .header h1 {
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 2rem;
    color: var(--text);
    letter-spacing: -0.5px;
  }
  .header p {
    color: var(--muted);
    font-size: 0.95rem;
    margin-top: 6px;
  }

  .section-title {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.3rem;
    margin: 36px 0 16px;
    padding: 10px 16px;
    border-radius: 10px;
    color: white;
    text-align: center;
    max-width: 720px;
    margin-left: auto;
    margin-right: auto;
  }
  .section-title.warmup { background: var(--green); }
  .section-title.upper { background: var(--blue); }
  .section-title.fullbody { background: var(--accent); }
  .section-title.mobility { background: var(--warm); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .card {
    background: var(--card);
    border-radius: 14px;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .card-top {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 16px 10px;
  }

  .card-top svg {
    flex-shrink: 0;
    border-radius: 10px;
    background: #f3f4f6;
  }

  .card-top .info h3 {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    line-height: 1.25;
  }
  .card-top .info .sets {
    font-size: 0.82rem;
    color: var(--accent);
    font-weight: 600;
    margin-top: 2px;
  }

  .card-desc {
    padding: 0 16px 14px;
    font-size: 0.85rem;
    color: var(--muted);
    line-height: 1.5;
  }

  .phase-note {
    max-width: 720px;
    margin: 8px auto 0;
    padding: 10px 16px;
    background: #f0f0f0;
    border-radius: 8px;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
  }

  .legend {
    max-width: 720px;
    margin: 16px auto;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .legend span {
    font-size: 0.78rem;
    padding: 4px 10px;
    border-radius: 20px;
    color: white;
    font-weight: 600;
  }

  @media (max-width: 500px) {
    .grid { grid-template-columns: 1fr; }
    .card-top svg { width: 90px; height: 90px; }
  }

  @media print {
    body { padding: 8px; background: white; }
    .card { break-inside: avoid; box-shadow: none; border: 1px solid #ddd; }
    .section-title { break-before: auto; }
  }
</style>
</head>

        <text x="22" y="66" font-size="7" fill="#e94560" font-family="sans-serif">forward</text>
        <defs><marker id="ahf" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#e94560"/></marker></defs>
      </svg>`
    },
    {
      name: "Pallof Press",
      sets: "3 x 8 per side",
      desc: "Stand sideways. Hold a dumbbell at your chest with both hands. Press it straight out in front of you, resisting the urge to rotate. Bring it back to chest. This trains your core to RESIST rotation, which is excellent for back health.",
      svg: `<svg viewBox="0 0 120 120" width="110" height="110" xmlns="http://www.w3.org/2000/svg">
        <rect width="120" height="120" fill="#f3f4f6" rx="10"/>
        <circle cx="45" cy="20" r="8" fill="#1a1a2e"/>
        <line x1="45" y1="28" x2="45" y2="65" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
        <line x1="45" y1="65" x2="38" y2="98" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
        <line x1="45" y1="65" x2="52" y2="98" stroke="#1a1a2e" stroke-width="3" stroke-linecap="round"/>
        <!-- arms pressing out -->
        <line x1="45" y1="40" x2="55" y2="40" stroke="#1a1a2e" stroke-width="2.5" stroke-linecap="round"/>
        <line x1="55" y1="40" x2="85" y2="40" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"/>
        <rect x="82" y="36" width="10" height="8" rx="2" fill="#0f3460"/>
        <!-- press arrow -->
        <path d="M65,32 L82,32" stroke="#e94560" stroke-width="1.5" fill="none" marker-end="url(#apf)"/>
        <text x="68" y="28" font-size="7" fill="#e94560" font-family="sans-serif">press out</text>
        <!-- no rotation note -->
        <text x="30" y="108" font-size="7" fill="#2e7d32" font-family="sans-serif">resist twisting!</text>
        <defs><marker id="apf" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#e94560"/></marker></defs>
      </svg>`
    },
  ]
}
];

// Render everything
const container = document.createElement('div');
container.id = 'app';

exercises.forEach(section => {
  const sTitle = document.createElement('div');
  sTitle.className = `section-title ${section.sectionClass}`;
  sTitle.textContent = section.section;
  container.appendChild(sTitle);

  if (section.sectionClass === 'mobility') {
    const note = document.createElement('div');
    note.className = 'phase-note';
    note.textContent = 'All core exercises here are C-section safe. No crunches, no sit-ups.';
    container.appendChild(note);
  }

  const grid = document.createElement('div');
  grid.className = 'grid';

  section.items.forEach(ex => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-top">
        ${ex.svg}
        <div class="info">
          <h3>${ex.name}</h3>
          <div class="sets">${ex.sets}</div>
        </div>
      </div>
      <div class="card-desc">${ex.desc}</div>
    `;
    grid.appendChild(card);
  });

  container.appendChild(grid);
});

document.body.appendChild(container);
</script>

</body>
</html>
